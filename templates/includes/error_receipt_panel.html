<section class="receipt mx-auto my-12 max-w-content px-6 md:px-0">
  <div class="receipt-inner px-8 py-10">
    <p class="font-mono text-[10px] font-bold uppercase tracking-[0.2em] text-seated-ink-light">{{ subtitle }}</p>
    <h1 class="mt-4 font-mono text-2xl font-bold tracking-tight text-seated-ink md:text-[1.65rem]">{{ headline }}</h1>
    {% if hint %}
    <p class="mt-4 text-sm leading-relaxed text-seated-ink-mid">{{ hint }}</p>
    {% endif %}
    <div class="mt-10 flex flex-wrap gap-3">
      {% if embedded %}
      <button type="button" class="btn-primary" onclick="window.location.reload()">Try again</button>
      {% else %}
      <a href="{{ site_url }}" class="btn-primary no-underline">{{ primary_label }}</a>
      <a href="#" class="btn-row inline-block py-3 no-underline" onclick="history.back(); return false;">Go back</a>
      {% endif %}
    </div>
    {% if correlation_id %}
    <p class="mt-12 border-t border-seated-rule pt-4 font-mono text-[10px] uppercase tracking-[0.12em] text-seated-ink-light">
      Ref: {{ correlation_id }}
    </p>
    {% endif %}
    <div class="tear mt-12"></div>
  </div>
</section>
