{% extends "base.html" %}
{% block title %}Setup step 1 - Seated{% endblock %}
{% block content %}
<section class="receipt">
  <div class="receipt-inner">
    <p class="text-[10px] font-bold uppercase tracking-[0.2em] text-seated-ink-light">Step {{ step }} of 4</p>
    <h1 class="mt-2 text-2xl font-bold text-seated-ink">Restaurant details</h1>
    <hr class="my-6 border-0 border-t border-seated-rule" />
    <form method="post" class="form-stack">
      {% csrf_token %}
      {% include "includes/form_fields.html" with form=form %}
      <div class="mt-8 flex flex-wrap items-center justify-between gap-4 border-t border-seated-rule pt-6">
        <a href="{% url 'home' %}" class="text-[11px] font-bold uppercase tracking-navlink text-seated-ink-light no-underline transition-colors hover:text-seated-ink">← Back</a>
        <button class="btn-primary" type="submit">Next: tables</button>
      </div>
    </form>
  </div>
</section>
{% endblock %}
