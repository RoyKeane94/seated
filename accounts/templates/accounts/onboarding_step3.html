{% extends "base.html" %}
{% block title %}Setup step 3 - Seated{% endblock %}
{% block content %}
<section class="receipt">
  <div class="receipt-inner">
    <p class="text-[10px] font-bold uppercase tracking-[0.2em] text-seated-ink-light">Step {{ step }} of 4</p>
    <h1 class="mt-2 text-2xl font-bold text-seated-ink">Your services</h1>
    <p class="mt-2 text-sm text-seated-ink-mid">Add opening hours, turn times, and sitting mode for each service.</p>
    <hr class="my-6 border-0 border-t border-seated-rule" />
    <form method="post" id="services-form" class="form-stack">
      {% csrf_token %}
      {{ form.services_json }}
      <div id="service-list" class="space-y-3"></div>
      <button type="button" id="add-service" class="btn-row mt-2">+ Add service</button>
      <div class="mt-8 flex flex-wrap items-center justify-between gap-4 border-t border-seated-rule pt-6">
        <a href="{% url 'accounts:onboarding_step2' %}" class="text-[11px] font-bold uppercase tracking-navlink text-seated-ink-light no-underline transition-colors hover:text-seated-ink">← Back</a>
        <button class="btn-primary" type="submit">Next: review</button>
      </div>
    </form>
  </div>
</section>
<script>
(() => {
  const CHEVRON =
    '<span class="pointer-events-none shrink-0 text-seated-ink-light" aria-hidden="true">' +
    '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 14 14" fill="none">' +
    '<path stroke="currentColor" stroke-width="1.5" stroke-linecap="round" d="M3.5 5.25 7 8.75l3.5-3.5"/></svg></span>';

  function closeAllSeatedDropdowns(exceptEl) {
    document.querySelectorAll(".seated-dropdown.is-open").forEach((el) => {
      if (el !== exceptEl) el.classList.remove("is-open");
    });
  }

  document.addEventListener("click", () => closeAllSeatedDropdowns(null));
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") closeAllSeatedDropdowns(null);
  });

  function normalizeItems(options) {
    return options.map((o) =>
      typeof o === "object" && o !== null && "value" in o
        ? { value: String(o.value), label: String(o.label ?? o.value) }
        : { value: String(o), label: String(o) }
    );
  }

  function mountSeatedDropdown(host, optionsSpec, initial, onChange, valueKind = "string") {
    const items = normalizeItems(optionsSpec);
    let initialStr = String(initial);
    if (!items.some((i) => i.value === initialStr)) initialStr = items[0].value;
    let current = initialStr;

    const trigger = document.createElement("button");
    trigger.type = "button";
    trigger.className = "seated-dropdown-trigger";
    trigger.setAttribute("aria-haspopup", "listbox");
    trigger.setAttribute("aria-expanded", "false");

    const panel = document.createElement("ul");
    panel.className = "seated-dropdown-panel";
    panel.setAttribute("role", "listbox");

    function labelFor(val) {
      const it = items.find((i) => i.value === val);
      return it ? it.label : val;
    }

    function syncPanelActive() {
      panel.querySelectorAll(".seated-dropdown-option").forEach((li) => {
        li.classList.toggle("is-active", li.dataset.val === current);
      });
    }

    function renderTrigger() {
      trigger.innerHTML = `<span>${labelFor(current)}</span>${CHEVRON}`;
    }

    function renderPanel() {
      panel.innerHTML = items
        .map(
          (it) =>
            `<li role="option" class="seated-dropdown-option" data-val="${it.value}" tabindex="-1">${it.label}</li>`
        )
        .join("");
      panel.querySelectorAll(".seated-dropdown-option").forEach((li) => {
        li.addEventListener("mousedown", (e) => {
          e.preventDefault();
          current = li.dataset.val;
          renderTrigger();
          syncPanelActive();
          host.classList.remove("is-open");
          trigger.setAttribute("aria-expanded", "false");
          onChange(valueKind === "number" ? Number(current) : current);
        });
      });
      syncPanelActive();
    }

    renderTrigger();
    renderPanel();

    trigger.addEventListener("click", (e) => {
      e.stopPropagation();
      const opening = !host.classList.contains("is-open");
      closeAllSeatedDropdowns(host);
      host.classList.toggle("is-open", opening);
      trigger.setAttribute("aria-expanded", opening ? "true" : "false");
    });

    panel.addEventListener("click", (e) => e.stopPropagation());
    host.appendChild(trigger);
    host.appendChild(panel);

    return {
      getValue: () => (valueKind === "number" ? Number(current) : current),
      setValue: (v) => {
        const s = String(v);
        if (items.some((i) => i.value === s)) current = s;
        renderTrigger();
        syncPanelActive();
      },
    };
  }

  const list = document.getElementById("service-list");
  const jsonField = document.querySelector('input[name="services_json"]');

  const modeChoices = [
    { value: "flexible", label: "Flexible" },
    { value: "fixed", label: "Fixed" },
  ];

  /** Matches `Service.DAYS` / Python `date.weekday()`: 0 = Monday … 6 = Sunday */
  const WEEKDAYS = [
    [0, "Monday"],
    [1, "Tuesday"],
    [2, "Wednesday"],
    [3, "Thursday"],
    [4, "Friday"],
    [5, "Saturday"],
    [6, "Sunday"],
  ];

  const weekdayChecksHtml = WEEKDAYS.map(
    ([n, label]) =>
      `<label class="inline-flex cursor-pointer items-center gap-2">` +
      `<input type="checkbox" class="service-day" value="${n}" />` +
      `<span>${label}</span></label>`
  ).join("");

  function setServiceDaysFromPreset(card, preset) {
    if (preset == null) {
      card.querySelectorAll(".service-day").forEach((cb) => {
        const n = Number(cb.value);
        cb.checked = n >= 0 && n <= 5;
      });
      return;
    }
    if (!Array.isArray(preset.days_of_week)) {
      card.querySelectorAll(".service-day").forEach((cb) => {
        cb.checked = false;
      });
      return;
    }
    const selected = new Set(preset.days_of_week.map(Number));
    card.querySelectorAll(".service-day").forEach((cb) => {
      cb.checked = selected.has(Number(cb.value));
    });
  }

  const addRow = (preset = null) => {
    const card = document.createElement("div");
    card.className = "space-y-3 border border-seated-rule-dark bg-white p-4";
    card.innerHTML = `
      <div class="form-field">
        <label class="mb-1 block text-[10px] font-bold uppercase text-seated-ink-light">Name</label>
        <input class="input service-name" value="Evening" />
      </div>
      <div class="form-field">
        <span class="mb-1 block text-[10px] font-bold uppercase text-seated-ink-light">Days</span>
        <div class="service-days-row flex flex-wrap gap-x-4 gap-y-2 font-mono text-sm text-seated-ink">${weekdayChecksHtml}</div>
      </div>
      <div class="grid grid-cols-1 gap-2 sm:grid-cols-2">
        <div class="form-field">
          <label class="mb-1 block text-[10px] font-bold uppercase text-seated-ink-light">Start</label>
          <input type="time" class="input service-start" value="18:00" />
        </div>
        <div class="form-field">
          <label class="mb-1 block text-[10px] font-bold uppercase text-seated-ink-light">End</label>
          <input type="time" class="input service-end" value="21:00" />
        </div>
      </div>
      <div class="form-field">
        <label class="mb-1 block text-[10px] font-bold uppercase text-seated-ink-light">Turn (minutes)</label>
        <input type="number" class="input service-turn" value="90" />
      </div>
      <div class="form-field">
        <span class="mb-1 block text-[10px] font-bold uppercase text-seated-ink-light">Mode</span>
        <div class="seated-dropdown service-mode-dd"></div>
      </div>
      <div class="form-field">
        <label class="mb-1 block text-[10px] font-bold uppercase text-seated-ink-light">Fixed slots (comma HH:MM)</label>
        <input class="input service-fixed" value="" placeholder="18:30, 21:00" />
      </div>
    `;
    list.appendChild(card);

    const modeHost = card.querySelector(".service-mode-dd");
    const modeInitial =
      preset && preset.sitting_mode ? preset.sitting_mode : "flexible";
    card._modeDd = mountSeatedDropdown(modeHost, modeChoices, modeInitial, () => {}, "string");

    if (preset) {
      card.querySelector(".service-name").value = preset.name || "Evening";
      const st = preset.start_time ? String(preset.start_time).slice(0, 5) : "18:00";
      const en = preset.end_time ? String(preset.end_time).slice(0, 5) : "21:00";
      card.querySelector(".service-start").value = st;
      card.querySelector(".service-end").value = en;
      card.querySelector(".service-turn").value = String(preset.turn_time_minutes || 90);
      card.querySelector(".service-fixed").value = (preset.fixed_sitting_times || []).join(", ");
    }
    setServiceDaysFromPreset(card, preset);
  };

  document.getElementById("add-service").addEventListener("click", () => addRow(null));

  document.getElementById("services-form").addEventListener("submit", () => {
    const payload = [...list.children].map((card) => ({
      name: card.querySelector(".service-name").value,
      days_of_week: [...card.querySelectorAll(".service-day:checked")]
        .map((cb) => Number(cb.value))
        .sort((a, b) => a - b),
      start_time: card.querySelector(".service-start").value,
      end_time: card.querySelector(".service-end").value,
      turn_time_minutes: Number(card.querySelector(".service-turn").value || 90),
      sitting_mode: card._modeDd.getValue(),
      fixed_sitting_times: card.querySelector(".service-fixed").value
        ? card.querySelector(".service-fixed").value.split(",").map((v) => v.trim())
        : [],
      slot_interval_minutes: 15,
    }));
    jsonField.value = JSON.stringify(payload);
  });

  let initial = [];
  try {
    initial = JSON.parse(jsonField.value || "[]");
  } catch (e) {
    initial = [];
  }
  if (Array.isArray(initial) && initial.length) {
    initial.forEach((svc) => addRow(svc));
  } else {
    addRow(null);
  }
})();
</script>
{% endblock %}
